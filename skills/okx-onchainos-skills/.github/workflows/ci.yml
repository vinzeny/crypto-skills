# ──────────────────────────────────────────────────────────────
# Continuous integration pipeline
# Trigger: push to any branch / pull requests
# Checks: formatting + Clippy static analysis + unit tests + cargo audit
# Cross-platform: Ubuntu / macOS / Windows
# ──────────────────────────────────────────────────────────────
name: CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.5 or 2.0.0-beta.0) — must match Cargo.toml"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_DIR: cli

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.CARGO_DIR }}

      - name: Check formatting
        working-directory: ${{ env.CARGO_DIR }}
        run: cargo fmt --check

      - name: Clippy lint
        working-directory: ${{ env.CARGO_DIR }}
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: ${{ env.CARGO_DIR }}
        run: cargo test
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_SECRET_KEY: ${{ secrets.OKX_SECRET_KEY }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}

  # ── Dependency vulnerability audit (runs once, not per-platform) ──
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit dependencies for known vulnerabilities
        working-directory: ${{ env.CARGO_DIR }}
        run: cargo audit
