name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Sync version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CURRENT_VERSION="$(node -p "require('./package.json').version")"

          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            echo "Version already synced: $CURRENT_VERSION"
          else
            npm version "$VERSION" --no-git-tag-version
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build
        run: node dist/index.cjs --version

      - name: Create release tarballs
        run: |
          # Main scoped package tarball for direct download / inspection
          PACK_FILE="$(npm pack --silent)"
          echo "PACK_FILE=$PACK_FILE" >> "$GITHUB_ENV"

          # 0.2.x bridge artifact for legacy updater path (GitHub byreal-cli.tgz)
          cp package.json package.json.bak
          node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));pkg.name='byreal-cli';fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
          LEGACY_PACK_FILE="$(npm pack --silent)"
          mv "$LEGACY_PACK_FILE" byreal-cli.tgz
          mv package.json.bak package.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.PACK_FILE }}
            byreal-cli.tgz
